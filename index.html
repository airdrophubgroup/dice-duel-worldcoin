<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNV Duel Arena | Absolute Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        :root { --tnv: #00ff88; --gold: #ffd700; }
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
        .tnv-token { display: inline-block; width: 18px; height: 18px; background: linear-gradient(145deg, #cd7f32, #ffd700); border-radius: 50%; color: #121212; font-weight: bold; font-size: 11px; line-height: 18px; border: 1px solid #ffd700; box-shadow: 0 0 5px rgba(255,215,0,0.5); vertical-align: middle; }
        .header { padding: 15px; background: #1e1e1e; border-bottom: 2px solid var(--tnv); }
        .tnv-container { display: flex; align-items: center; justify-content: center; margin-top: 8px; }
        .progress-bar { width: 60%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--tnv); width: 0%; transition: 0.5s; }
        .leaderboard-section { margin: 25px 10px; background: #1a1a1a; border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        .lb-header { background: #252525; padding: 12px; color: var(--tnv); font-weight: bold; }
        .lb-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .lb-table th { padding: 10px; background: #222; color: #888; }
        .lb-table td { padding: 12px 8px; border-bottom: 1px solid #222; }
        .stats-box { display: flex; justify-content: space-around; padding: 15px; background: #252525; margin: 15px; border-radius: 15px; border: 1px solid #333; }
        .scene { width: 100px; height: 100px; margin: 40px auto; perspective: 600px; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.2s; }
        .cube__face { position: absolute; width: 100px; height: 100px; border: 2px solid #333; line-height: 100px; font-size: 40px; background: white; color: black; border-radius: 10px; font-weight: bold; }
        .front { transform: rotateY(0deg) translateZ(50px); } .back { transform: rotateY(180deg) translateZ(50px); }
        .right { transform: rotateY(90deg) translateZ(50px); } .left { transform: rotateY(-90deg) translateZ(50px); }
        .top { transform: rotateX(90deg) translateZ(50px); } .bottom { transform: rotateX(-90deg) translateZ(50px); }
        .btn { background: var(--tnv); color: black; border: none; padding: 18px 30px; font-size: 18px; border-radius: 12px; font-weight: bold; width: 85%; cursor: pointer; }
        #loading-intro { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .duel-logo { width: 120px; height: 120px; border: 4px solid var(--tnv); border-radius: 20px; color: var(--tnv); font-size: 22px; display: flex; align-items: center; justify-content: center; font-weight: bold; animation: pulse 1s infinite; }
        .token { position: absolute; width: 25px; height: 25px; background: linear-gradient(145deg, #cd7f32, #ffd700); border-radius: 50%; border: 2px solid #ffd700; z-index: 1000; animation: fall 1.5s linear forwards; }
        @keyframes pulse { 0%, 100% {transform: scale(1);} 50% {transform: scale(1.1);} }
        @keyframes fall { 0% {transform: translateY(-50px) rotate(0deg);} 100% {transform: translateY(100vh) rotate(360deg);} }
    </style>
</head>
<body>

    <div id="loading-intro"><div class="duel-logo">DICE DUEL</div><p style="color: var(--tnv);">SYNCING DUEL...</p></div>

    <div class="header">
        <h1>TNV Duel Arena🎲</h1>
        <div class="tnv-container">
            <div class="progress-bar"><div id="p-fill" class="progress-fill"></div></div>
            <div style="margin-left:10px;"><span id="balance-num" style="font-weight:bold;">0</span><span class="tnv-token"></span></div>
        </div>
    </div>

    <div id="setup-screen">
        <div style="padding: 20px;"><button class="btn" id="start-btn" onclick="initGame()">PLAY NOW (0.5 WLD)</button></div>
        <div class="leaderboard-section">
            <div class="lb-header">🏆 GLOBAL RANKINGS</div>
            <table class="lb-table"><thead><tr><th>Rank</th><th>Player</th><th>Played</th><th>Won</th><th>TNV</th></tr></thead>
            <tbody id="leaderboard-body"><tr><td colspan="5">Loading...</td></tr></tbody></table>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="stats-box">
            <div>ME: <span id="my-score">0</span></div>
            <div id="timer" style="color: #ff4444; font-weight: bold; font-size: 28px;">30s</div>
            <div>OPP: <span id="opp-score">0</span></div>
        </div>
        <div class="scene" onclick="rollDice()"><div class="cube" id="dice-cube">
            <div class="cube__face front">1</div><div class="cube__face back">6</div>
            <div class="cube__face right">3</div><div class="cube__face left">4</div>
            <div class="cube__face top">2</div><div class="cube__face bottom">5</div>
        </div></div>
    </div>

    <script>
        const SB_URL = "https://efmkazyrxllcyvcwmewd.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmbWthenlyeGxsY3l2Y3dtZXdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0ODYzMTMsImV4cCI6MjA5NDA2MjMxM30.PaKHyjZOkDCcyK0x7Qd1_DSSTS_ra5PYDuZwYIf5GyA";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let myAddress, matchId, isP1, myScore = 0, gameActive = false, timeLeft = 30, syncInterval, timerInterval;

        window.onload = loadLeaderboard;

        async function loadLeaderboard() {
            const { data } = await supabaseClient.from('user_rewards').select('*').order('tnv_balance', { ascending: false }).limit(10);
            if(data) document.getElementById('leaderboard-body').innerHTML = data.map((u, i) => `<tr><td>#${i+1}</td><td>${u.wallet_address.slice(0,6)}...</td><td>${u.games_played || 0}</td><td>${u.games_won || 0}</td><td>${u.tnv_balance} <span class="tnv-token"></span></td></tr>`).join('');
        }

        async function initGame() {
            if (window.ethereum) {
                const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
                myAddress = accs[0];
            } else { myAddress = "GUEST_" + Math.floor(Math.random()*1000); }
            loadRewards();
            const { data } = await supabaseClient.rpc('join_or_create_match', { p_address: myAddress });
            matchId = data.match_id; isP1 = data.is_p1;
            
            syncInterval = setInterval(async () => {
                if(!matchId) return;
                const { data: mData } = await supabaseClient.from('matches').select('*').eq('id', matchId).single();
                if(mData) {
                    document.getElementById('opp-score').innerText = isP1 ? mData.p2_score : mData.p1_score;
                    if(mData.status === 'playing' && !gameActive) startGame();
                    if(mData.status === 'finished') triggerEnd();
                }
            }, 1000);
        }

        async function loadRewards() {
            const { data } = await supabaseClient.from('user_rewards').select('tnv_balance').eq('wallet_address', myAddress).single();
            if(data) { document.getElementById('balance-num').innerText = data.tnv_balance; document.getElementById('p-fill').style.width = Math.min((data.tnv_balance / 500 * 100), 100) + "%"; }
        }

        function startGame() {
            gameActive = true; 
            document.getElementById('loading-intro').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('loading-intro').style.display = 'none';
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                timerInterval = setInterval(() => {
                    if(!gameActive) return;
                    timeLeft--;
                    document.getElementById('timer').innerText = timeLeft + "s";
                    if(timeLeft <= 0) { 
                        clearInterval(timerInterval); 
                        forceFinish(); 
                    }
                }, 1000);
            }, 3000);
        }

        async function rollDice() {
            if(!gameActive) return;
            myScore += Math.floor(Math.random() * 6) + 1;
            document.getElementById('my-score').innerText = myScore;
            document.getElementById('dice-cube').style.transform = `rotateX(${Math.random()*360}deg) rotateY(${Math.random()*360}deg)`;
            await supabaseClient.from('matches').update(isP1 ? { p1_score: myScore } : { p2_score: myScore }).eq('id', matchId);
        }

        // Timer khatam hote hi database ko batayein
        async function forceFinish() {
            if(!matchId) return;
            await supabaseClient.from('matches').update({ status: 'finished' }).eq('id', matchId);
            // Safety: Agar doosre player ka net slow ho, toh 3 sec baad khud hi triggerEnd chala do
            setTimeout(() => { if(gameActive) triggerEnd(); }, 3000);
        }

        async function triggerEnd() {
            if(!gameActive || !matchId) return;
            gameActive = false;
            clearInterval(syncInterval);
            clearInterval(timerInterval);
            
            makeCoinsFall(10);
            
            // Final Fetch
            const { data: finalM } = await supabaseClient.from('matches').select('*').eq('id', matchId).single();
            const win = isP1 ? finalM.p1_score > finalM.p2_score : finalM.p2_score > finalM.p1_score;
            
            const { data: curStat } = await supabaseClient.from('user_rewards').select('games_played, games_won').eq('wallet_address', myAddress).single();
            
            await supabaseClient.from('user_rewards').update({ 
                games_played: (curStat.games_played || 0) + 1,
                games_won: win ? (curStat.games_won || 0) + 1 : (curStat.games_won || 0)
            }).eq('wallet_address', myAddress);
            
            await supabaseClient.rpc('increment_tnv', { player_wallet: myAddress, amount: win ? 15 : 10 });
            
            alert(win ? "VICTORY! +15 TNV" : "GAME OVER! +10 TNV");
            matchId = null;
            location.reload();
        }

        function makeCoinsFall(amt) {
            for (let i = 0; i < amt; i++) {
                const t = document.createElement('div'); t.className = 'token';
                t.style.left = Math.random() * 100 + 'vw'; document.body.appendChild(t);
                setTimeout(() => t.remove(), 2000);
            }
        }
    </script>
</body>
</html>
