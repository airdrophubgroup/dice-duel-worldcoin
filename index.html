<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNV Duel Arena | Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        :root { --tnv-green: #00ff88; }
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
        .header { padding: 20px; background: #1e1e1e; border-bottom: 2px solid var(--tnv-green); }
        .stats-box { display: flex; justify-content: space-around; padding: 15px; background: #222; margin: 10px; border-radius: 12px; border: 1px solid #333; }
        
        /* 3D Dice */
        .scene { width: 100px; height: 100px; margin: 40px auto; perspective: 400px; cursor: pointer; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.2s; }
        .cube__face { position: absolute; width: 100px; height: 100px; border: 2px solid #333; line-height: 100px; font-size: 40px; background: white; color: black; border-radius: 10px; font-weight: bold; display: flex; justify-content: center; align-items: center; }
        .front  { transform: rotateY(  0deg) translateZ(50px); } .back   { transform: rotateY(180deg) translateZ(50px); }
        .right  { transform: rotateY( 90deg) translateZ(50px); } .left   { transform: rotateY(-90deg) translateZ(50px); }
        .top    { transform: rotateX( 90deg) translateZ(50px); } .bottom { transform: rotateX(-90deg) translateZ(50px); }

        .btn { background: var(--tnv-green); color: black; border: none; padding: 18px 30px; font-size: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 85%; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,255,136,0.2); }
        .btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        #status-msg { color: var(--tnv-green); margin: 15px; font-size: 14px; min-height: 20px; }
        .progress-bar { width: 80%; height: 10px; background: #333; margin: 10px auto; border-radius: 5px; }
        .progress-fill { height: 100%; background: var(--tnv-green); width: 0%; transition: 0.5s; box-shadow: 0 0 10px var(--tnv-green); }
    </style>
</head>
<body>

    <div class="header">
        <h1>TNV Duel Arena 🎲</h1>
        <div id="tnv-display">TNV Balance: 0 / 500</div>
        <div class="progress-bar"><div id="p-fill" class="progress-fill"></div></div>
    </div>

    <div id="setup-screen" style="padding: 60px 20px;">
        <button class="btn" id="start-btn" onclick="initGame()">FIND MATCH (0.5 WLD)</button>
        <p id="status-msg">Connect wallet to earn Airdrop</p>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="stats-box">
            <div>ME: <span id="my-score">0</span></div>
            <div id="timer" style="color: #ff4444; font-weight: bold; font-size: 26px;">30s</div>
            <div>OPP: <span id="opp-score">0</span></div>
        </div>

        <div class="scene" onclick="rollDice()">
            <div class="cube" id="dice-cube">
                <div class="cube__face front">1</div><div class="cube__face back">6</div>
                <div class="cube__face right">3</div><div class="cube__face left">4</div>
                <div class="cube__face top">2</div><div class="cube__face bottom">5</div>
            </div>
        </div>
        <p style="color: var(--tnv-green); font-weight: bold; animation: blink 1s infinite;">TAP THE DICE FAST!</p>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SB_URL = "https://efmkazyrollcyvcwmewd.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmbWthenlyeGxsY3l2Y3dtZXdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0ODYzMTMsImV4cCI6MjA5NDA2MjMxM30.PaKHyjZOkDCcyK0x7Qd1_DSSTS_ra5PYDuZwYIf5GyA";
        
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let myAddress = null, matchId = null, isP1 = false, myScore = 0, gameActive = false, timeLeft = 30;

        async function initGame() {
            console.log("Starting...");
            const status = document.getElementById('status-msg');
            
            // Check if wallet exists
            if (window.ethereum) {
                try {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    const accounts = await provider.send("eth_requestAccounts", []);
                    myAddress = accounts[0];
                } catch (e) {
                    return alert("Wallet connection rejected.");
                }
            } else {
                // Testing Mode for Chrome without MetaMask
                let guestName = prompt("Wallet nahi mila. Testing ke liye apna naam daalein:");
                if(!guestName) return;
                myAddress = "GUEST_" + guestName.replace(/\s/g, '');
            }

            status.innerText = "Searching for opponent...";
            document.getElementById('start-btn').disabled = true;
            
            loadRewards();
            findMatch();
        }

        async function loadRewards() {
            const { data } = await supabaseClient.from('user_rewards').select('tnv_balance').eq('wallet_address', myAddress).single();
            if(data) {
                document.getElementById('tnv-display').innerText = `TNV Balance: ${data.tnv_balance} / 500`;
                document.getElementById('p-fill').style.width = Math.min((data.tnv_balance / 500 * 100), 100) + "%";
            }
        }

        async function findMatch() {
            // Check for waiting room
            const { data: waitMatch } = await supabaseClient.from('matches')
                .select('*')
                .eq('status', 'waiting')
                .neq('player_1', myAddress) // Don't match with self
                .limit(1).single();

            if (waitMatch) {
                matchId = waitMatch.id; isP1 = false;
                await supabaseClient.from('matches').update({ player_2: myAddress, status: 'playing' }).eq('id', matchId);
            } else {
                const { data: newM } = await supabaseClient.from('matches').insert([{ player_1: myAddress }]).select().single();
                matchId = newM.id; isP1 = true;
            }
            subscribeToMatch();
        }

        function subscribeToMatch() {
            supabaseClient.channel(`m_${matchId}`).on('postgres_changes', { event:'UPDATE', schema:'public', table:'matches', filter:`id=eq.${matchId}` }, 
            payload => {
                const d = payload.new;
                document.getElementById('opp-score').innerText = isP1 ? d.p2_score : d.p1_score;
                if(d.status === 'playing' && !gameActive) startGame();
            }).subscribe();
        }

        function startGame() {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            gameActive = true;
            const timerInt = setInterval(() => {
                timeLeft--; 
                document.getElementById('timer').innerText = timeLeft + "s";
                if(timeLeft <= 0) { 
                    clearInterval(timerInt); 
                    gameActive = false; 
                    endGame(); 
                }
            }, 1000);
        }

        function rollDice() {
            if(!gameActive) return;
            const cube = document.getElementById('dice-cube');
            const x = Math.floor(Math.random() * 4) * 90;
            const y = Math.floor(Math.random() * 4) * 90;
            cube.style.transform = `rotateX(${x}deg) rotateY(${y}deg)`;

            const points = Math.floor(Math.random() * 6) + 1;
            myScore += points;
            document.getElementById('my-score').innerText = myScore;
            
            const update = isP1 ? { p1_score: myScore } : { p2_score: myScore };
            supabaseClient.from('matches').update(update).eq('id', matchId);
        }

        async function endGame() {
            const { data: match } = await supabaseClient.from('matches').select('*').eq('id', matchId).single();
            const win = isP1 ? match.p1_score > match.p2_score : match.p2_score > match.p1_score;
            
            // Call Supabase function
            await supabaseClient.rpc('increment_tnv', { player_wallet: myAddress, amount: win ? 15 : 10 });
            
            alert(win ? "VICTORY! You earned 15 TNV" : "DEFEAT! You earned 10 TNV");
            location.reload();
        }
    </script>
    <style>
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.4;} 100% {opacity: 1;} }
    </style>
</body>
</html>
