<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNV Duel Arena | Final Sync Build</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        :root { --tnv: #00ff88; --gold: #ffd700; }
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
        
        .tnv-token { display: inline-block; width: 18px; height: 18px; background: linear-gradient(145deg, #cd7f32, #ffd700); border-radius: 50%; color: #121212; font-weight: bold; font-size: 11px; line-height: 18px; border: 1px solid #ffd700; box-shadow: 0 0 5px rgba(255,215,0,0.5); vertical-align: middle; }
        .header { padding: 15px; background: #1e1e1e; border-bottom: 2px solid var(--tnv); }
        .tnv-container { display: flex; align-items: center; justify-content: center; margin-top: 8px; }
        .progress-bar { width: 60%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--tnv); width: 0%; transition: 0.5s; }

        /* Leaderboard Style */
        .leaderboard-section { margin: 25px 10px; background: #1a1a1a; border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        .lb-header { background: #252525; padding: 12px; color: var(--tnv); font-weight: bold; border-bottom: 1px solid #333; }
        .lb-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .lb-table th { padding: 10px; background: #222; color: #888; border-bottom: 1px solid #333; }
        .lb-table td { padding: 12px 8px; border-bottom: 1px solid #222; }
        .rank-highlight { color: var(--gold); font-weight: bold; }
        
        .stats-box { display: flex; justify-content: space-around; padding: 15px; background: #252525; margin: 15px; border-radius: 15px; border: 1px solid #333; }
        .scene { width: 100px; height: 100px; margin: 40px auto; perspective: 600px; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.2s; }
        .cube__face { position: absolute; width: 100px; height: 100px; border: 2px solid #333; line-height: 100px; font-size: 40px; background: white; color: black; border-radius: 10px; font-weight: bold; display: flex; justify-content: center; align-items: center; }
        .front { transform: rotateY(0deg) translateZ(50px); } .back { transform: rotateY(180deg) translateZ(50px); }
        .right { transform: rotateY(90deg) translateZ(50px); } .left { transform: rotateY(-90deg) translateZ(50px); }
        .top { transform: rotateX(90deg) translateZ(50px); } .bottom { transform: rotateX(-90deg) translateZ(50px); }
        
        .btn { background: var(--tnv); color: black; border: none; padding: 18px 30px; font-size: 18px; border-radius: 12px; font-weight: bold; width: 85%; cursor: pointer; transition: 0.3s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; background: #444; color: #888; }

        #loading-intro { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .duel-logo { width: 120px; height: 120px; border: 4px solid var(--tnv); border-radius: 20px; color: var(--tnv); font-size: 22px; display: flex; align-items: center; justify-content: center; font-weight: bold; animation: pulse 1s infinite; margin-bottom: 20px; }
        .token { position: absolute; width: 25px; height: 25px; background: linear-gradient(145deg, #cd7f32, #ffd700); border-radius: 50%; border: 2px solid #ffd700; z-index: 1000; animation: fall 1.5s linear forwards; }
        @keyframes pulse { 0%, 100% {transform: scale(1);} 50% {transform: scale(1.1);} }
        @keyframes fall { 0% {transform: translateY(-50px) rotate(0deg);} 100% {transform: translateY(100vh) rotate(360deg);} }
    </style>
</head>
<body>

    <div id="loading-intro">
        <div class="duel-logo">DICE DUEL</div>
        <p id="loading-text" style="color: var(--tnv); font-weight: bold;">SYNCING DUEL...</p>
    </div>

    <div class="header">
        <h1>TNV Duel Arena🎲</h1>
        <div class="tnv-container">
            <div class="progress-bar"><div id="p-fill" class="progress-fill"></div></div>
            <div style="margin-left:10px;"><span id="balance-num" style="font-weight:bold;">0</span><span class="tnv-token"></span></div>
        </div>
    </div>

    <div id="setup-screen">
        <div style="padding: 20px;">
            <button class="btn" id="start-btn" onclick="initGame()">PLAY NOW (0.5 WLD)</button>
            <p id="status-msg" style="font-size:14px; color:var(--tnv); margin-top:10px;">Ready to Duel</p>
        </div>

        <div class="leaderboard-section">
            <div class="lb-header">🏆 GLOBAL RANKINGS</div>
            <table class="lb-table">
                <thead>
                    <tr><th>Rank</th><th>Player</th><th>Played</th><th>Won</th><th>TNV</th></tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr><td colspan="5">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="stats-box">
            <div>ME: <span id="my-score">0</span></div>
            <div id="timer" style="color: #ff4444; font-weight: bold; font-size: 28px;">30s</div>
            <div>OPP: <span id="opp-score">0</span></div>
        </div>
        <div class="scene" onclick="rollDice()"><div class="cube" id="dice-cube">
            <div class="cube__face front">1</div><div class="cube__face back">6</div>
            <div class="cube__face right">3</div><div class="cube__face left">4</div>
            <div class="cube__face top">2</div><div class="cube__face bottom">5</div>
        </div></div>
    </div>

    <script>
        const SB_URL = "https://efmkazyrxllcyvcwmewd.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmbWthenlyeGxsY3l2Y3dtZXdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0ODYzMTMsImV4cCI6MjA5NDA2MjMxM30.PaKHyjZOkDCcyK0x7Qd1_DSSTS_ra5PYDuZwYIf5GyA";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let myAddress, matchId, isP1, myScore = 0, oppScore = 0, gameActive = false, timeLeft = 30, searchTimer;

        window.onload = loadLeaderboard;

        async function loadLeaderboard() {
            const { data } = await supabaseClient.from('user_rewards').select('*').order('tnv_balance', { ascending: false }).limit(10);
            if(data) {
                document.getElementById('leaderboard-body').innerHTML = data.map((u, i) => `
                    <tr class="${i < 3 ? 'rank-highlight' : ''}">
                        <td>#${i+1}</td>
                        <td style="font-family:monospace">${u.wallet_address.slice(0,6)}...</td>
                        <td>${u.games_played || 0}</td>
                        <td>${u.games_won || 0}</td>
                        <td>${u.tnv_balance} <span class="tnv-token"></span></td>
                    </tr>
                `).join('');
            }
        }

        async function initGame() {
            const startBtn = document.getElementById('start-btn');
            startBtn.disabled = true;
            
            if (window.ethereum) {
                const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
                myAddress = accs[0];
            } else { myAddress = "GUEST_" + Math.floor(Math.random()*1000); }
            
            loadRewards();

            // 60s Search Timer
            let searchTimeLeft = 60;
            searchTimer = setInterval(() => {
                searchTimeLeft--;
                startBtn.innerText = `MATCHING... (${searchTimeLeft}s)`;
                if (searchTimeLeft <= 0) {
                    clearInterval(searchTimer);
                    startBtn.disabled = false;
                    startBtn.innerText = "TRY AGAIN (NO OPPONENT)";
                }
            }, 1000);

            const { data, error } = await supabaseClient.rpc('join_or_create_match', { p_address: myAddress });
            if(error) { resetBtn(); return alert(error.message); }
            
            matchId = data.match_id;
            isP1 = data.is_p1;
            
            // Subscribing for Real-time Start
            supabaseClient.channel(`match_${matchId}`).on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'matches', filter: `id=eq.${matchId}` }, payload => {
                const mData = payload.new;
                oppScore = isP1 ? (mData.p2_score || 0) : (mData.p1_score || 0);
                document.getElementById('opp-score').innerText = oppScore;
                
                // Dono side 'playing' status aate hi prepareGame trigger karenge
                if(mData.status === 'playing' && !gameActive) {
                    clearInterval(searchTimer);
                    prepareGame();
                }
                if(mData.status === 'finished' && gameActive) triggerEnd();
            }).subscribe();
        }

        async function loadRewards() {
            const { data } = await supabaseClient.from('user_rewards').select('tnv_balance').eq('wallet_address', myAddress).single();
            if(data) {
                document.getElementById('balance-num').innerText = data.tnv_balance;
                document.getElementById('p-fill').style.width = Math.min((data.tnv_balance / 500 * 100), 100) + "%";
            }
        }

        function prepareGame() {
            gameActive = true; 
            document.getElementById('loading-intro').style.display = 'flex';
            let countdown = 3;
            
            const readyInterval = setInterval(() => {
                document.getElementById('loading-text').innerText = `STARTING IN ${countdown}...`;
                countdown--;
                if(countdown < 0) {
                    clearInterval(readyInterval);
                    document.getElementById('loading-intro').style.display = 'none';
                    document.getElementById('setup-screen').style.display = 'none';
                    document.getElementById('game-screen').style.display = 'block';
                    startTimer();
                }
            }, 1000);
        }

        function startTimer() {
            const timer = setInterval(() => {
                if(!gameActive) { clearInterval(timer); return; }
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft + "s";
                if(timeLeft <= 0) { clearInterval(timer); finishMatch(); }
            }, 1000);
        }

        async function rollDice() {
            if(!gameActive) return;
            myScore += Math.floor(Math.random() * 6) + 1;
            document.getElementById('my-score').innerText = myScore;
            document.getElementById('dice-cube').style.transform = `rotateX(${Math.random()*360}deg) rotateY(${Math.random()*360}deg)`;
            await supabaseClient.from('matches').update(isP1 ? { p1_score: myScore } : { p2_score: myScore }).eq('id', matchId);
        }

        async function finishMatch() {
            await supabaseClient.from('matches').update({ status: 'finished' }).eq('id', matchId);
        }

        async function triggerEnd() {
            if(!gameActive) return;
            gameActive = false;
            makeCoinsFall(10);
            setTimeout(async () => {
                const { data: m } = await supabaseClient.from('matches').select('*').eq('id', matchId).single();
                const myF = isP1 ? m.p1_score : m.p2_score;
                const opF = isP1 ? m.p2_score : m.p1_score;
                const win = myF > opF;
                
                // Update Stats
                const { data: cur } = await supabaseClient.from('user_rewards').select('games_played, games_won').eq('wallet_address', myAddress).single();
                await supabaseClient.from('user_rewards').update({ 
                    games_played: (cur.games_played || 0) + 1,
                    games_won: win ? (cur.games_won || 0) + 1 : (cur.games_won || 0)
                }).eq('wallet_address', myAddress);
                
                await supabaseClient.rpc('increment_tnv', { player_wallet: myAddress, amount: win ? 15 : 10 });
                alert(win ? "YOU WIN! +15 TNV" : "GAME OVER! +10 TNV");
                location.reload();
            }, 1000);
        }

        function makeCoinsFall(amt) {
            for (let i = 0; i < amt; i++) {
                const t = document.createElement('div'); t.className = 'token';
                t.style.left = Math.random() * 100 + 'vw'; document.body.appendChild(t);
                setTimeout(() => t.remove(), 2000);
            }
        }
    </script>
</body>
</html>
