<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNV Duel Arena | Absolute Master Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --tnv: #00ff88; --gold: #ffd700; }
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow: hidden; }
        .tnv-token { display: inline-block; width: 18px; height: 18px; background: linear-gradient(145deg, #cd7f32, #ffd700); border-radius: 50%; border: 1px solid #ffd700; vertical-align: middle; }
        .header { padding: 15px; background: #1e1e1e; border-bottom: 2px solid var(--tnv); }
        .progress-bar { width: 60%; height: 8px; background: #333; border-radius: 4px; margin: 10px auto; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--tnv); width: 0%; transition: 0.5s; }
        .stats-box { display: flex; justify-content: space-around; padding: 15px; background: #252525; margin: 15px; border-radius: 15px; border: 1px solid #333; }
        .scene { width: 100px; height: 100px; margin: 40px auto; perspective: 600px; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.2s; cursor: pointer; }
        .cube__face { position: absolute; width: 100px; height: 100px; border: 2px solid #333; line-height: 100px; font-size: 40px; background: white; color: black; border-radius: 10px; font-weight: bold; }
        .front { transform: rotateY(0deg) translateZ(50px); } .back { transform: rotateY(180deg) translateZ(50px); }
        .right { transform: rotateY(90deg) translateZ(50px); } .left { transform: rotateY(-90deg) translateZ(50px); }
        .top { transform: rotateX(90deg) translateZ(50px); } .bottom { transform: rotateX(-90deg) translateZ(50px); }
        .btn { background: var(--tnv); color: black; border: none; padding: 18px 30px; font-size: 18px; border-radius: 12px; font-weight: bold; width: 85%; cursor: pointer; }
        .btn:disabled { background: #444; color: #888; }
        #waiting-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid var(--tnv); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="waiting-overlay">
        <div class="spinner"></div>
        <h2 id="wait-status">SEARCHING FOR OPPONENT...</h2>
        <p id="match-timer" style="font-size: 24px; color: var(--tnv);">60s</p>
    </div>

    <div class="header">
        <h1>TNV Duel Arena🎲</h1>
        <div class="progress-bar"><div id="p-fill" class="progress-fill"></div></div>
        <div id="balance-area">Balance: <span id="balance-num">0</span> <span class="tnv-token"></span></div>
    </div>

    <div id="setup-screen" style="padding-top: 50px;">
        <button class="btn" id="start-btn" onclick="initMatchmaking()">PLAY NOW (0.5 WLD)</button>
        <div id="lb-container" style="margin-top:30px; font-size:12px;"></div>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="stats-box">
            <div>ME: <span id="my-score">0</span></div>
            <div id="game-timer" style="color: #ff4444; font-weight: bold; font-size: 32px;">30s</div>
            <div>OPP: <span id="opp-score">0</span></div>
        </div>
        <div class="scene" onclick="rollDice()"><div class="cube" id="dice-cube">
            <div class="cube__face front">1</div><div class="cube__face back">6</div>
            <div class="cube__face right">3</div><div class="cube__face left">4</div>
            <div class="cube__face top">2</div><div class="cube__face bottom">5</div>
        </div></div>
    </div>

    <script>
        const SB_URL = "https://efmkazyrxllcyvcwmewd.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmbWthenlyeGxsY3l2Y3dtZXdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0ODYzMTMsImV4cCI6MjA5NDA2MjMxM30.PaKHyjZOkDCcyK0x7Qd1_DSSTS_ra5PYDuZwYIf5GyA";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let myAddress, matchId, isP1, myScore = 0, oppScore = 0, gameActive = false, matchmakingActive = false, channel;

        async function initMatchmaking() {
            if (matchmakingActive) return;
            matchmakingActive = true;
            const btn = document.getElementById('start-btn');
            btn.disabled = true;
            document.getElementById('waiting-overlay').style.display = 'flex';

            if (window.ethereum) {
                const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
                myAddress = accs[0];
            } else { myAddress = "GUEST_" + Math.floor(Math.random()*1000); }

            // 60s Waiting Logic
            let timeLeft = 60;
            const mTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('match-timer').innerText = timeLeft + "s";
                if (timeLeft <= 0 || gameActive) {
                    clearInterval(mTimer);
                    if (!gameActive) resetToHome();
                }
            }, 1000);

            const { data } = await supabaseClient.rpc('join_or_create_match', { p_address: myAddress });
            matchId = data.match_id; isP1 = data.is_p1;

            // Broadcast Channel for Instant Sync
            channel = supabaseClient.channel(`room_${matchId}`, { config: { broadcast: { self: true } } });

            channel.on('broadcast', { event: 'game_start' }, () => startSyncCountdown())
                   .on('broadcast', { event: 'score_update' }, ({ payload }) => {
                        if (payload.sender !== myAddress) {
                            oppScore = payload.score;
                            document.getElementById('opp-score').innerText = oppScore;
                        }
                   })
                   .on('broadcast', { event: 'game_force_end' }, () => finalizeGame())
                   .subscribe(async (status) => {
                        if (status === 'SUBSCRIBED') {
                            await supabaseClient.from('matches').update(isP1 ? { p1_ready: true } : { p2_ready: true }).eq('id', matchId);
                            checkBothReady();
                        }
                   });
        }

        async function checkBothReady() {
            const { data } = await supabaseClient.from('matches').select('p1_ready, p2_ready').eq('id', matchId).single();
            if (data.p1_ready && data.p2_ready) {
                channel.send({ type: 'broadcast', event: 'game_start' });
            } else {
                setTimeout(checkBothReady, 1000); // Check every second until both are in
            }
        }

        function startSyncCountdown() {
            if (gameActive) return;
            gameActive = true;
            let cd = 3;
            const loader = document.getElementById('wait-status');
            const timer = setInterval(() => {
                loader.innerText = `STARTING IN ${cd}...`;
                cd--;
                if (cd < 0) {
                    clearInterval(timer);
                    document.getElementById('waiting-overlay').style.display = 'none';
                    document.getElementById('setup-screen').style.display = 'none';
                    document.getElementById('game-screen').style.display = 'block';
                    runTimer();
                }
            }, 1000);
        }

        function runTimer() {
            let gTime = 30;
            const t = setInterval(() => {
                gTime--;
                document.getElementById('game-timer').innerText = gTime + "s";
                if (gTime <= 0) {
                    clearInterval(t);
                    channel.send({ type: 'broadcast', event: 'game_force_end' });
                }
            }, 1000);
        }

        async function rollDice() {
            if (!gameActive || document.getElementById('game-timer').innerText === "0s") return;
            myScore += Math.floor(Math.random() * 6) + 1;
            document.getElementById('my-score').innerText = myScore;
            document.getElementById('dice-cube').style.transform = `rotateX(${Math.random()*360}deg) rotateY(${Math.random()*360}deg)`;
            
            // Instant score broadcast
            channel.send({ type: 'broadcast', event: 'score_update', payload: { sender: myAddress, score: myScore } });
            // DB backup
            await supabaseClient.from('matches').update(isP1 ? { p1_score: myScore } : { p2_score: myScore }).eq('id', matchId);
        }

        async function finalizeGame() {
            gameActive = false;
            const { data: m } = await supabaseClient.from('matches').select('*').eq('id', matchId).single();
            const myFinal = isP1 ? m.p1_score : m.p2_score;
            const opFinal = isP1 ? m.p2_score : m.p1_score;
            const win = myFinal > opFinal;

            await supabaseClient.rpc('increment_tnv', { player_wallet: myAddress, amount: win ? 15 : 10 });
            alert(win ? "VICTORY! +15 TNV" : "GAME OVER! +10 TNV");
            location.reload(); // Reset to Home
        }

        function resetToHome() {
            document.getElementById('waiting-overlay').style.display = 'none';
            document.getElementById('start-btn').disabled = false;
            document.getElementById('start-btn').innerText = "TRY AGAIN (NO OPPONENT)";
            matchmakingActive = false;
        }
    </script>
</body>
</html>
