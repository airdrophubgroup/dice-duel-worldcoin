<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNV Duel Arena | Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        :root { --tnv-green: #00ff88; }
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; }
        .header { padding: 20px; background: #1e1e1e; border-bottom: 2px solid var(--tnv-green); }
        .stats-box { display: flex; justify-content: space-around; padding: 15px; background: #252525; margin: 15px; border-radius: 15px; border: 1px solid #333; }
        .scene { width: 100px; height: 100px; margin: 40px auto; perspective: 600px; cursor: pointer; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.2s; }
        .cube__face { position: absolute; width: 100px; height: 100px; border: 2px solid #333; line-height: 100px; font-size: 45px; background: white; color: black; border-radius: 12px; font-weight: bold; display: flex; justify-content: center; align-items: center; }
        .front { transform: rotateY(0deg) translateZ(50px); } .back { transform: rotateY(180deg) translateZ(50px); }
        .right { transform: rotateY(90deg) translateZ(50px); } .left { transform: rotateY(-90deg) translateZ(50px); }
        .top { transform: rotateX(90deg) translateZ(50px); } .bottom { transform: rotateX(-90deg) translateZ(50px); }
        .btn { background: var(--tnv-green); color: black; border: none; padding: 18px 35px; font-size: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 85%; margin-top: 15px; }
        .leaderboard { margin: 20px; background: #1e1e1e; border-radius: 15px; padding: 15px; border: 1px solid #333; }
        .lb-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; font-size: 14px; }
        .rank-1 { color: gold; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>TNV Duel Arena 🎲</h1>
        <div id="tnv-display">Balance: Loading...</div>
    </div>

    <div id="setup-screen" style="padding: 40px 20px;">
        <button class="btn" id="start-btn" onclick="initGame()">PLAY NOW (0.5 WLD)</button>
        <p id="status-msg">Ready to start</p>
        
        <div class="leaderboard">
            <h3 style="color: var(--tnv-green); margin-top: 0;">🏆 Top Players</h3>
            <div id="leaderboard-list">Loading...</div>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="stats-box">
            <div>ME: <span id="my-score" style="color: var(--tnv-green); font-weight: bold; font-size: 24px;">0</span></div>
            <div id="timer" style="color: #ff4444; font-weight: bold; font-size: 28px;">30s</div>
            <div>OPP: <span id="opp-score" style="color: #aaa; font-size: 24px;">0</span></div>
        </div>
        <div class="scene" onclick="rollDice()">
            <div class="cube" id="dice-cube">
                <div class="cube__face front">1</div><div class="cube__face back">6</div>
                <div class="cube__face right">3</div><div class="cube__face left">4</div>
                <div class="cube__face top">2</div><div class="cube__face bottom">5</div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://efmkazyrxllcyvcwmewd.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmbWthenlyeGxsY3l2Y3dtZXdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0ODYzMTMsImV4cCI6MjA5NDA2MjMxM30.PaKHyjZOkDCcyK0x7Qd1_DSSTS_ra5PYDuZwYIf5GyA";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let myAddress, matchId, isP1, myScore = 0, gameActive = false, timeLeft = 30;

        window.onload = loadLeaderboard;

        async function loadLeaderboard() {
            const { data } = await supabaseClient.from('user_rewards').select('wallet_address, tnv_balance').order('tnv_balance', { ascending: false }).limit(5);
            if(data) {
                let html = '';
                data.forEach((u, i) => {
                    const addr = u.wallet_address.substring(0,6) + "..." + u.wallet_address.slice(-4);
                    html += `<div class="lb-row ${i === 0 ? 'rank-1' : ''}"><span>#${i+1} ${addr}</span><span>${u.tnv_balance} TNV</span></div>`;
                });
                document.getElementById('leaderboard-list').innerHTML = html;
            }
        }

        async function initGame() {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                myAddress = accounts[0];
            } else {
                let guest = prompt("Naam:");
                myAddress = "GUEST_" + (guest || "USER").toUpperCase();
            }
            document.getElementById('start-btn').disabled = true;
            loadRewards();
            findMatch();
        }

        async function loadRewards() {
            const { data } = await supabaseClient.from('user_rewards').select('tnv_balance').eq('wallet_address', myAddress).single();
            if(data) document.getElementById('tnv-display').innerText = `Balance: ${data.tnv_balance} TNV`;
        }

        async function findMatch() {
            const { data: rooms } = await supabaseClient.from('matches').select('*').eq('status', 'waiting').is('player_2', null).neq('player_1', myAddress).limit(1);
            
            if (rooms && rooms.length > 0) {
                matchId = rooms[0].id; isP1 = false;
                await supabaseClient.from('matches').update({ player_2: myAddress, status: 'playing' }).eq('id', matchId);
            } else {
                const { data: newMatch } = await supabaseClient.from('matches').insert([{ player_1: myAddress, status: 'waiting' }]).select();
                matchId = newMatch[0].id; isP1 = true;
            }
            subscribe();
        }

        function subscribe() {
            // Backup check: Agar signal miss ho jaye toh har 1.5s mein check karega
            const backupCheck = setInterval(async () => {
                const { data } = await supabaseClient.from('matches').select('*').eq('id', matchId).single();
                if(data && data.status === 'playing' && !gameActive) startGame();
                if(data) document.getElementById('opp-score').innerText = isP1 ? data.p2_score : data.p1_score;
                if(data && data.status === 'finished' && gameActive) endGame();
            }, 1500);

            supabaseClient.channel(`m_${matchId}`).on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'matches', filter: `id=eq.${matchId}` }, (p) => {
                const d = p.new;
                document.getElementById('opp-score').innerText = isP1 ? d.p2_score : d.p1_score;
                if (d.status === 'playing' && !gameActive) {
                    clearInterval(backupCheck);
                    startGame();
                }
                if (d.status === 'finished' && gameActive) endGame();
            }).subscribe();
        }

        function startGame() {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            gameActive = true;
            const t = setInterval(() => {
                timeLeft--; 
                document.getElementById('timer').innerText = timeLeft + "s";
                if(timeLeft <= 0) { clearInterval(t); if(gameActive) endGame(); }
            }, 1000);
        }

        async function rollDice() {
            if(!gameActive) return;
            myScore += Math.floor(Math.random() * 6) + 1;
            document.getElementById('my-score').innerText = myScore;
            document.getElementById('dice-cube').style.transform = `rotateX(${Math.random()*360}deg) rotateY(${Math.random()*360}deg)`;
            await supabaseClient.from('matches').update(isP1 ? { p1_score: myScore } : { p2_score: myScore }).eq('id', matchId);
        }

        async function endGame() {
            if(!gameActive) return; gameActive = false;
            await supabaseClient.from('matches').update({ status: 'finished' }).eq('id', matchId);
            setTimeout(async () => {
                const { data: m } = await supabaseClient.from('matches').select('*').eq('id', matchId).single();
                const myF = isP1 ? m.p1_score : m.p2_score;
                const opF = isP1 ? m.p2_score : m.p1_score;
                const win = myF > opF;
                const tie = myF === opF;
                await supabaseClient.rpc('increment_tnv', { player_wallet: myAddress, amount: win ? 15 : (tie ? 12 : 10) });
                alert(`Result: ${win ? "WIN!" : (tie ? "TIE!" : "LOST!")}`);
                location.reload();
            }, 1000);
        }
    </script>
</body>
</html>
