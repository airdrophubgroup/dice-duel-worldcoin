<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNV Duel Arena | 100% Match Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --tnv: #00ff88; --gold: #ffd700; }
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
        
        .tnv-token { display: inline-block; width: 18px; height: 18px; background: linear-gradient(145deg, #cd7f32, #ffd700); border-radius: 50%; color: #121212; font-weight: bold; font-size: 11px; line-height: 18px; border: 1px solid #ffd700; vertical-align: middle; }
        .header { padding: 15px; background: #1e1e1e; border-bottom: 2px solid var(--tnv); }
        .progress-bar { width: 60%; height: 8px; background: #333; border-radius: 4px; margin: 10px auto; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--tnv); width: 0%; transition: 0.5s; }

        .leaderboard-section { margin: 25px 10px; background: #1a1a1a; border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        .lb-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .lb-table td, .lb-table th { padding: 12px 8px; border-bottom: 1px solid #222; }
        
        .stats-box { display: flex; justify-content: space-around; padding: 15px; background: #252525; margin: 15px; border-radius: 15px; border: 1px solid #333; }
        .scene { width: 100px; height: 100px; margin: 40px auto; perspective: 600px; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.2s; }
        .cube__face { position: absolute; width: 100px; height: 100px; border: 2px solid #333; line-height: 100px; font-size: 40px; background: white; color: black; border-radius: 10px; font-weight: bold; }
        
        /* Positions for Dice */
        .front { transform: rotateY(0deg) translateZ(50px); } .back { transform: rotateY(180deg) translateZ(50px); }
        .right { transform: rotateY(90deg) translateZ(50px); } .left { transform: rotateY(-90deg) translateZ(50px); }
        .top { transform: rotateX(90deg) translateZ(50px); } .bottom { transform: rotateX(-90deg) translateZ(50px); }
        
        .btn { background: var(--tnv); color: black; border: none; padding: 18px 30px; font-size: 18px; border-radius: 12px; font-weight: bold; width: 85%; cursor: pointer; }
        .btn:disabled { background: #444; color: #888; cursor: not-allowed; }

        /* Full Screen Waiting Overlay */
        #waiting-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18,18,18,0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid var(--tnv); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="waiting-overlay">
        <div class="spinner"></div>
        <h2 id="wait-status">WAITING FOR OPPONENT...</h2>
        <p id="match-timer" style="font-size: 24px; color: var(--tnv);">60s</p>
    </div>

    <div class="header">
        <h1>TNV Duel Arena🎲</h1>
        <div class="progress-bar"><div id="p-fill" class="progress-fill"></div></div>
        <div id="balance-area">Balance: <span id="balance-num">0</span> <span class="tnv-token"></span></div>
    </div>

    <div id="setup-screen">
        <div style="padding: 20px;">
            <button class="btn" id="start-btn" onclick="initMatchmaking()">PLAY NOW (0.5 WLD)</button>
        </div>
        <div class="leaderboard-section">
            <div class="lb-header" style="padding:10px;">🏆 TOP PLAYERS</div>
            <table class="lb-table"><tbody id="leaderboard-body"></tbody></table>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="stats-box">
            <div>ME: <span id="my-score">0</span></div>
            <div id="game-timer" style="color: #ff4444; font-weight: bold; font-size: 28px;">30s</div>
            <div>OPP: <span id="opp-score">0</span></div>
        </div>
        <div class="scene" onclick="rollDice()"><div class="cube" id="dice-cube">
            <div class="cube__face front">1</div><div class="cube__face back">6</div>
            <div class="cube__face right">3</div><div class="cube__face left">4</div>
            <div class="cube__face top">2</div><div class="cube__face bottom">5</div>
        </div></div>
    </div>

    <script>
        const SB_URL = "https://efmkazyrxllcyvcwmewd.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmbWthenlyeGxsY3l2Y3dtZXdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0ODYzMTMsImV4cCI6MjA5NDA2MjMxM30.PaKHyjZOkDCcyK0x7Qd1_DSSTS_ra5PYDuZwYIf5GyA";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let myAddress, matchId, isP1, myScore = 0, oppScore = 0, gameActive = false, matchmakingActive = false;

        window.onload = loadLeaderboard;

        async function loadLeaderboard() {
            const { data } = await supabaseClient.from('user_rewards').select('*').order('tnv_balance', { ascending: false }).limit(5);
            if(data) document.getElementById('leaderboard-body').innerHTML = data.map((u, i) => `<tr><td>#${i+1}</td><td>${u.wallet_address.slice(0,6)}...</td><td>${u.tnv_balance} <span class="tnv-token"></span></td></tr>`).join('');
        }

        async function initMatchmaking() {
            if (matchmakingActive) return;
            matchmakingActive = true;
            
            const btn = document.getElementById('start-btn');
            const overlay = document.getElementById('waiting-overlay');
            const matchTimerLabel = document.getElementById('match-timer');
            
            btn.disabled = true;
            overlay.style.display = 'flex';

            // Wallet Connect
            if (window.ethereum) {
                const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
                myAddress = accs[0];
            } else { myAddress = "GUEST_" + Math.floor(Math.random()*1000); }

            // 60s Matchmaking Logic
            let timeLeft = 60;
            const mTimer = setInterval(() => {
                timeLeft--;
                matchTimerLabel.innerText = timeLeft + "s";
                if (timeLeft <= 0 || gameActive) {
                    clearInterval(mTimer);
                    if (!gameActive) {
                        overlay.style.display = 'none';
                        btn.disabled = false;
                        btn.innerText = "NO OPPONENT FOUND - TRY AGAIN";
                        matchmakingActive = false;
                    }
                }
            }, 1000);

            // Join Match
            const { data } = await supabaseClient.rpc('join_or_create_match', { p_address: myAddress });
            matchId = data.match_id; isP1 = data.is_p1;

            // Mark READY in DB
            await supabaseClient.from('matches').update(isP1 ? { p1_ready: true } : { p2_ready: true }).eq('id', matchId);

            // REALTIME SYNC
            supabaseClient.channel(`m_${matchId}`).on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'matches', filter: `id=eq.${matchId}` }, payload => {
                const d = payload.new;
                
                // Score Update
                oppScore = isP1 ? (d.p2_score || 0) : (d.p1_score || 0);
                document.getElementById('opp-score').innerText = oppScore;

                // PERFECT START: Check if BOTH are ready
                if (d.p1_ready && d.p2_ready && d.status === 'playing' && !gameActive) {
                    startTheGame();
                }

                if (d.status === 'finished' && gameActive) {
                    endTheGame();
                }
            }).subscribe();
        }

        function startTheGame() {
            gameActive = true;
            const statusLabel = document.getElementById('wait-status');
            let countdown = 3;

            // Dono device par countdown ek saath chalega
            const cd = setInterval(() => {
                statusLabel.innerText = `STARTING IN ${countdown}...`;
                countdown--;
                if (countdown < 0) {
                    clearInterval(cd);
                    document.getElementById('waiting-overlay').style.display = 'none';
                    document.getElementById('setup-screen').style.display = 'none';
                    document.getElementById('game-screen').style.display = 'block';
                    runGameTimer();
                }
            }, 1000);
        }

        function runGameTimer() {
            let gTime = 30;
            const t = setInterval(() => {
                if (!gameActive) { clearInterval(t); return; }
                gTime--;
                document.getElementById('game-timer').innerText = gTime + "s";
                if (gTime <= 0) {
                    clearInterval(t);
                    supabaseClient.from('matches').update({ status: 'finished' }).eq('id', matchId);
                }
            }, 1000);
        }

        async function rollDice() {
            if(!gameActive) return;
            myScore += Math.floor(Math.random() * 6) + 1;
            document.getElementById('my-score').innerText = myScore;
            document.getElementById('dice-cube').style.transform = `rotateX(${Math.random()*360}deg) rotateY(${Math.random()*360}deg)`;
            await supabaseClient.from('matches').update(isP1 ? { p1_score: myScore } : { p2_score: myScore }).eq('id', matchId);
        }

        async function endTheGame() {
            gameActive = false;
            setTimeout(async () => {
                const { data: m } = await supabaseClient.from('matches').select('*').eq('id', matchId).single();
                const myF = isP1 ? m.p1_score : m.p2_score;
                const opF = isP1 ? m.p2_score : m.p1_score;
                const win = myF > opF;

                await supabaseClient.rpc('increment_tnv', { player_wallet: myAddress, amount: win ? 15 : 10 });
                alert(win ? "VICTORY! +15 TNV" : "GAME OVER! +10 TNV");
                location.reload();
            }, 1000);
        }
    </script>
</body>
</html>
