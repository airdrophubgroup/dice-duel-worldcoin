<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNV Duel Arena | Verified Build</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@worldcoin/idkit"></script>
    <style>
        :root { --tnv: #00ff88; --gold: #ffd700; }
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow: hidden; }
        .tnv-token { display: inline-block; width: 18px; height: 18px; background: linear-gradient(145deg, #cd7f32, #ffd700); border-radius: 50%; border: 1px solid #ffd700; vertical-align: middle; }
        .header { padding: 15px; background: #1e1e1e; border-bottom: 2px solid var(--tnv); }
        .progress-bar { width: 60%; height: 8px; background: #333; border-radius: 4px; margin: 10px auto; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--tnv); width: 0%; transition: 0.5s; }
        .leaderboard-section { margin: 20px 10px; background: #1a1a1a; border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        .lb-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .lb-table td, .lb-table th { padding: 10px; border-bottom: 1px solid #222; }
        .btn { background: var(--tnv); color: black; border: none; padding: 18px 30px; font-size: 18px; border-radius: 12px; font-weight: bold; width: 85%; cursor: pointer; }
        .btn:disabled { background: #444; color: #888; }
        #waiting-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid var(--tnv); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="waiting-overlay">
        <div class="spinner"></div>
        <h2 id="wait-status">SYNCING WITH WORLD CHAIN...</h2>
        <p id="match-timer" style="font-size: 24px; color: var(--tnv);">60s</p>
    </div>

    <div class="header">
        <h1>TNV Duel Arena🎲</h1>
        <div class="progress-bar"><div id="p-fill" class="progress-fill"></div></div>
        <div>Balance: <span id="balance-num">0</span> <span class="tnv-token"></span></div>
    </div>

    <div id="setup-screen">
        <div style="padding: 20px;">
            <button class="btn" id="start-btn" onclick="verifyAndPlay()">LOGIN WITH WORLD ID</button>
        </div>
        <div class="leaderboard-section">
            <table class="lb-table"><tbody id="leaderboard-body"></tbody></table>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <div style="display:flex; justify-content:space-around; padding:20px; background:#252525;">
            <div>ME: <span id="my-score">0</span></div>
            <div id="game-timer" style="color:#ff4444; font-size:24px; font-weight:bold;">30s</div>
            <div>OPP: <span id="opp-score">0</span></div>
        </div>
        <div style="margin:50px auto; width:100px; height:100px; background:white; color:black; font-size:40px; line-height:100px; border-radius:10px;" onclick="rollDice()">🎲</div>
    </div>

    <script>
        const SB_URL = "https://efmkazyrxllcyvcwmewd.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmbWthenlyeGxsY3l2Y3dtZXdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0ODYzMTMsImV4cCI6MjA5NDA2MjMxM30.PaKHyjZOkDCcyK0x7Qd1_DSSTS_ra5PYDuZwYIf5GyA";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let myAddress, matchId, isP1, myScore = 0, gameActive = false;

        window.onload = loadLeaderboard;

        async function verifyAndPlay() {
            // World ID Verification - This triggers the native World App popup
            IDKit.onSuccess = async (result) => {
                console.log("Verified!");
                if (window.ethereum) {
                    const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    myAddress = accs[0];
                    document.getElementById('start-btn').innerText = "PLAY NOW";
                    loadRewards();
                    initMatchmaking();
                }
            };

            IDKit.init({
                app_id: "app_staging_645d9476059c118747f480356264939b", // Yahan apni Portal ki ID dalo
                action: "login",
                onSuccess: IDKit.onSuccess,
            });

            IDKit.open();
        }

        async function initMatchmaking() {
            document.getElementById('waiting-overlay').style.display = 'flex';
            const { data } = await supabaseClient.rpc('join_or_create_match', { p_address: myAddress });
            matchId = data.match_id; isP1 = data.is_p1;

            const channel = supabaseClient.channel(`m_${matchId}`, { config: { broadcast: { self: true } } });
            channel.on('broadcast', { event: 'game_start' }, () => {
                document.getElementById('waiting-overlay').style.display = 'none';
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                gameActive = true;
                startTimer();
            }).on('broadcast', { event: 'score' }, ({payload}) => {
                if(payload.addr !== myAddress) document.getElementById('opp-score').innerText = payload.val;
            }).subscribe(async (status) => {
                if(status === 'SUBSCRIBED') {
                    await supabaseClient.from('matches').update(isP1 ? {p1_ready:true} : {p2_ready:true}).eq('id', matchId);
                    checkReady(channel);
                }
            });
        }

        async function checkReady(ch) {
            const { data } = await supabaseClient.from('matches').select('p1_ready, p2_ready').eq('id', matchId).single();
            if(data.p1_ready && data.p2_ready) ch.send({type:'broadcast', event:'game_start'});
            else setTimeout(() => checkReady(ch), 1000);
        }

        function startTimer() {
            let t = 30;
            const iv = setInterval(() => {
                t--; document.getElementById('game-timer').innerText = t+"s";
                if(t <= 0) { clearInterval(iv); finalize(); }
            }, 1000);
        }

        async function rollDice() {
            if(!gameActive) return;
            myScore += Math.floor(Math.random()*6)+1;
            document.getElementById('my-score').innerText = myScore;
            supabaseClient.channel(`m_${matchId}`).send({type:'broadcast', event:'score', payload:{addr:myAddress, val:myScore}});
        }

        async function finalize() {
            gameActive = false;
            const { data } = await supabaseClient.from('matches').select('*').eq('id', matchId).single();
            const win = isP1 ? data.p1_score > data.p2_score : data.p2_score > data.p1_score;
            await supabaseClient.rpc('increment_tnv', { player_wallet: myAddress, amount: win ? 15 : 10 });
            alert(win ? "WON!" : "LOST!");
            location.reload();
        }

        async function loadLeaderboard() {
            const { data } = await supabaseClient.from('user_rewards').select('*').order('tnv_balance', { ascending: false }).limit(5);
            if(data) document.getElementById('leaderboard-body').innerHTML = data.map((u,i)=>`<tr><td>#${i+1}</td><td>${u.wallet_address.slice(0,6)}</td><td>${u.tnv_balance}</td></tr>`).join('');
        }

        async function loadRewards() {
            const { data } = await supabaseClient.from('user_rewards').select('tnv_balance').eq('wallet_address', myAddress).single();
            if(data) document.getElementById('balance-num').innerText = data.tnv_balance;
        }
    </script>
</body>
</html>
